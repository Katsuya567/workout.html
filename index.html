<!DOCTYPE html>
<html>
<head>
<title>Free Workout App 💪</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;

  /* BEAUTIFUL MOVING BACKGROUND */
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 25px;
  width: 90%;
  max-width: 500px;
  margin: 60px auto;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff69b4;
  color: white;
  transform: scale(1.1);
}

input[type="checkbox"] {
  transform: scale(1.3);
  margin: 8px;
}

</style>

</head>
<body>

<div class="container">

<h1>💪 Free Workout App</h1>
<p>Workout for your health — No payments needed!</p>

<h2>Today's Exercises</h2>

<div>
<label><input type="checkbox"> 10 Pushups</label><br>
<label><input type="checkbox"> 15 Squats</label><br>
<label><input type="checkbox"> 30s Plank</label><br>
<label><input type="checkbox"> 20 Jumping Jacks</label><br>
</div>

<br>

<button onclick="startTimer()">Start 30s Timer ⏱</button>
<p id="timer"></p>

<br>

<button onclick="saveProgress()">Save Progress ✅</button>

</div>

<script>

function startTimer() {
  let time = 30;
  let timerDisplay = document.getElementById("timer");

  timerDisplay.innerHTML = time + " seconds left";

  let countdown = setInterval(function() {
    time--;
    timerDisplay.innerHTML = time + " seconds left";

    if (time <= 0) {
      clearInterval(countdown);
      timerDisplay.innerHTML = "✅ Timer Finished!";
    }
  }, 1000);
}

function saveProgress() {
  let checkboxes = document.querySelectorAll("input[type='checkbox']");
  let completed = [];

  checkboxes.forEach((box) => {
    completed.push(box.checked);
  });

  localStorage.setItem("workoutProgress", JSON.stringify(completed));
  alert("Progress Saved 💪");
}

window.onload = function() {
  let saved = JSON.parse(localStorage.getItem("workoutProgress"));
  if (saved) {
    let checkboxes = document.querySelectorAll("input[type='checkbox']");
    checkboxes.forEach((box, index) => {
      box.checked = saved[index];
    });
  }
}

</script>

</body>
</html>
